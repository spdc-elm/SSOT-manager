version: 1
source_root: __SOURCE_ROOT__

compositions:
  agent:
    output: build/prompts/AGENTS.generated.md
    variables:
      host: codex
      kind: system
    inputs:
      - path: Agents/assistant.md
        wrapper:
          before: "<assistant path=\"{{path}}\">\n"
          after: "\n</assistant>\n"
      - path: USER.md
        wrapper:
          before: "<user path=\"{{path}}\">\n"
          after: "\n</user>\n"
    renderer:
      kind: concat
      outer_wrapper:
        before: "<prompt host=\"{{host}}\" kind=\"{{kind}}\">\n"
        after: "\n</prompt>\n"

profiles:
  prompted:
    requires:
      - agent
    rules:
      - select: build/prompts/AGENTS.generated.md
        to:
          - __DEST_ROOT__/AGENTS.md
        mode: symlink
