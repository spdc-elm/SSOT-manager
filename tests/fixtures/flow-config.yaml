version: 1
source_root: __SOURCE_ROOT__

compositions:
  agent:
    output: build/prompts/AGENTS.generated.md
    variables:
      host: codex
    inputs:
      - path: Agents/assistant.md
        wrapper:
          before: "<assistant path=\"{{path}}\">\n"
          after: "\n</assistant>\n"
      - path: USER.md
        wrapper:
          before: "<user path=\"{{path}}\">\n"
          after: "\n</user>\n"
    renderer:
      kind: concat
      outer_wrapper:
        before: "<prompt host=\"{{host}}\">\n"
        after: "\n</prompt>\n"

profiles:
  skill-global:
    rules:
      - select: Skills/*
        to:
          - __DEST_ROOT__/skills/
        mode: symlink
      - select: Notes/notes.md
        to:
          - __DEST_ROOT__/manual/notes.md
        mode: symlink

  skill-safe:
    rules:
      - select: Skills/alpha
        to:
          - __DEST_ROOT__/safe-skills/
        mode: symlink

  copy-safe:
    rules:
      - select: Skills/alpha
        to:
          - __DEST_ROOT__/copied-skills/
        mode: copy
        ignore:
          - "**/.DS_Store"
          - "**/Thumbs.db"

  hardlink-safe:
    rules:
      - select: Skills/alpha
        to:
          - __DEST_ROOT__/hardlinked-skills/
        mode: hardlink
        ignore:
          - "**/.DS_Store"
          - "**/Thumbs.db"

  self-ref-parent-symlink:
    rules:
      - select: Agents/assistant.md
        to:
          - __DEST_ROOT__/self-ref-parent/agents/
        mode: symlink

  prompted:
    requires:
      - agent
    rules:
      - select: build/prompts/AGENTS.generated.md
        to:
          - __DEST_ROOT__/AGENTS.md
        mode: symlink

  takeover-safe:
    rules:
      - select: Notes/notes.md
        to:
          - __DEST_ROOT__/takeover/file.md
        mode: copy
      - select: Skills/alpha
        to:
          - __DEST_ROOT__/takeover/dir/
        mode: symlink
      - select: Notes/notes.md
        to:
          - __DEST_ROOT__/takeover/link.md
        mode: symlink
