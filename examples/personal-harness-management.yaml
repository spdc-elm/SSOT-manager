version: 1
source_root: ../..

profiles:
  skill-global:
    rules:
      - select: Skills/[!.]*
        to:
          - /tmp/ssot-manager-example/skills/
        mode: symlink

      - select: Agents/assistant.md
        to:
          - /tmp/ssot-manager-example/AGENTS.md
        mode: symlink

  kg-local:
    source_root: ../../KG_Local
    rules:
      - select: Skills/[!.]*
        to:
          - /tmp/ssot-manager-example/kg-skills/
        mode: symlink
