version: 1
source_root: ../../personal-harness-management
compositions:
  codex-system-prompt:
    inputs:
    - path: Agents/assistant.md
      wrapper:
        before: |
          <assistant_spec path="{{path}}">
        after: |2

          </assistant_spec>
    - path: USER.md
      wrapper:
        before: |
          <who_you_help_with>
          this is who you help with:
          <user_profile path="{{path}}">
        after: |2

          </user_profile>
          </who_you_help_with>
    variables:
      host: codex
    renderer:
      kind: concat
      outer_wrapper:
        before: |
          <system_prompt host="{{host}}">
        after: |2

          </system_prompt>
    output: build/prompts/codex/AGENTS.generated.md
profiles:
  antigravity-global:
    rules:
    - select: Skills/[!.]*
      to:
      - ~/.gemini/antigravity/skills/
      mode: symlink
    - select: Commands/[!.]*
      to:
      - ~/.gemini/antigravity/global_workflows/
      mode: symlink
  codex-global:
    requires:
    - codex-system-prompt
    rules:
    - select: Skills/[!.]*
      to:
      - ~/.agents/skills/
      mode: symlink
    - select: build/prompts/codex/AGENTS.generated.md
      to:
      - ~/.codex/AGENTS.md
      mode: symlink
  kglocal-project:
    rules:
    - select: KG_Local/Agents/[!.]*
      to:
      - .opencode/agent/
      mode: symlink
    - select: KG_Local/Commands/[!.]*
      to:
      - .opencode/commands/
      - .agent/workflows/
      mode: symlink
    - select: KG_Local/Skills/[!.]*
      to:
      - .claude/skills/
      - .agent/skills/
      mode: symlink
  opencode-global:
    rules:
    - select: Agents/[!.]*
      to:
      - ~/.config/opencode/agents/
      mode: symlink
    - select: Skills/[!.]*
      to:
      - ~/.config/opencode/skills/
      mode: symlink
    - select: Commands/[!.]*
      to:
      - ~/.config/opencode/commands/
      mode: symlink
  opencode-sandbox-copy:
    rules:
    - select: Agents/[!.]*
      to:
      - /tmp/ssot-manager-sync-prompts/opencode/agents/
      mode: copy
    - select: Skills/[!.]*
      to:
      - /tmp/ssot-manager-sync-prompts/opencode/skills/
      mode: copy
    - select: Commands/[!.]*
      to:
      - /tmp/ssot-manager-sync-prompts/opencode/commands/
      mode: copy
  project-global-skills:
    rules:
    - select: Skills/[!.]*
      to:
      - .agents/skills/
      mode: symlink
