name: CI and Release

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

  release:
    name: Release ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare archive metadata
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            echo "BIN_NAME=ssot-manager.exe" >> "$GITHUB_ENV"
          else
            echo "BIN_NAME=ssot-manager" >> "$GITHUB_ENV"
          fi
          echo "ASSET_STEM=ssot-manager-${{ github.ref_name }}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/package/${BIN_NAME}"
          cp README.md LICENSE dist/package/

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -C dist/package -czf "dist/${ASSET_STEM}.tar.gz" .

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd dist/package
          7z a "../${ASSET_STEM}.zip" ./*

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
